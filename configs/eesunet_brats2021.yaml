dataset:
  name: BraTS2021
  root: /path/to/BraTS2021
  modalities: [flair, t1, t1ce, t2]
  num_classes: 4

training:
  input_size: [128, 128, 128]
  epochs: 300
  batch_size: 2
  optimizer: Adam
  learning_rate: 1.0e-4
  scheduler: ReduceLROnPlateau
  patience: 20
  five_fold: true
  mixed_precision: true

augmentation:
  rotation_degrees: 20
  flip: true
  random_crop: true
  gaussian_noise: true

model:
  name: EESU-Net
  in_channels: 4
  out_channels: 4
  base_channels: 48
  window_size: [7, 7, 7]
  patch_size: [4, 4, 4]

inference:
  overlap: 0.5
  postprocess: true
